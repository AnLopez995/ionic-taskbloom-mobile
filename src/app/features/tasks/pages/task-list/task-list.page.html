<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>TaskBloom</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Progress summary -->
  <section class="summary" aria-label="Progress summary">
    <div class="summary__row">
      <ion-text>
        <h2 class="summary__count">{{ stats().completed }} / {{ stats().total }} done</h2>
      </ion-text>
      <ion-text color="medium">
        <span class="summary__pct">{{ stats().percentage }}%</span>
      </ion-text>
    </div>
    <ion-progress-bar [value]="stats().ratio"></ion-progress-bar>
  </section>

  @if (loading()) {
    <div class="state state--loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  } @else if (isEmpty()) {
    <div class="state state--empty">
      <ion-icon name="checkmark-done-outline" aria-hidden="true"></ion-icon>
      <ion-text color="medium">
        <p>No tasks yet. Tap + to add your first one.</p>
      </ion-text>
    </div>
  } @else {
    <ion-list lines="full">
      @for (task of tasks(); track task.id) {
        <ion-item-sliding>
          <ion-item>
            <ion-checkbox
              slot="start"
              [checked]="task.completed"
              (ionChange)="toggle(task)"
              [attr.aria-label]="'Toggle ' + task.title"
            ></ion-checkbox>
            <ion-label [class.completed]="task.completed">{{ task.title }}</ion-label>
          </ion-item>
          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="confirmDelete(task)">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      }
    </ion-list>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button aria-label="Add task" (click)="promptAdd()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
